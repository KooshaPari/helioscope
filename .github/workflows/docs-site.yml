name: Docs Site

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@v4@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package.json
      - name: Install deps
        working-directory: docs
        run: npm install
      - name: Build docs
        working-directory: docs
        run: npm run docs:build