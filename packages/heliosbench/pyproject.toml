[project]
name = "helios-bench"
version = "0.1.0"
description = "Helios Benchmarks - Benchmark definitions"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "harbor",
]

[project.scripts]
heliosbench = "heliosbench.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/heliosbench"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
