# Helios Router - Process Compose Configuration
# Usage: process-compose up -f process-compose.yaml

version: "1.0"

environment:
  - PYTHONPATH=./src
  - HELIOS_NATS_PORT=${HELIOS_NATS_PORT:-4222}
  - HELIOS_NATS_HTTP_PORT=${HELIOS_NATS_HTTP_PORT:-8222}
  - HELIOS_STREAMLIT_PORT=${HELIOS_STREAMLIT_PORT:-8501}
  - NATS_URL=nats://localhost:${HELIOS_NATS_PORT:-4222}

log_dir: .process-compose/logs
lock_dir: .process-compose/locks

services:
  nats-server:
    command: nats-server -js -p ${HELIOS_NATS_PORT:-4222} -m ${HELIOS_NATS_HTTP_PORT:-8222}
    info:
      description: NATS Server for event bus and KV cache
      port: ${HELIOS_NATS_PORT:-4222}
      health_endpoint: http://localhost:${HELIOS_NATS_HTTP_PORT:-8222}/healthz
    preflight:
      command: which nats-server
      required: true
      error_message: "Install NATS: brew install nats-server"
    log_file: .process-compose/logs/nats.log
    restart_policy: on-failure
    restart_delay: 5s
    env:
      - NATS__JETSTREAM=enabled
      - NATS__KV_STORE_DIR=/tmp/nats-kv

  streamlit:
    command: python3 -m streamlit run app.py --server.port ${HELIOS_STREAMLIT_PORT:-8501}
    working_dir: .
    info:
      description: Helios Router Dashboard
      port: ${HELIOS_STREAMLIT_PORT:-8501}
      health_endpoint: http://localhost:${HELIOS_STREAMLIT_PORT:-8501}/_stcore/health
    depends_on:
      - nats-server
    preflight:
      command: test -f app.py
      required: true
    log_file: .process-compose/logs/streamlit.log
    restart_policy: on-failure
    restart_delay: 5s
    env:
      - PYTHONPATH=./src
      - STREAMLIT_SERVER_PORT=${HELIOS_STREAMLIT_PORT:-8501}
    ready_line: "You can now view your Streamlit app"
