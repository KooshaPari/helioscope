name: Policy Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  policy-gate:
    name: policy-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce layered fix PR policy
        shell: bash
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          echo "HEAD_REF=$HEAD_REF"
          echo "BASE_REF=$BASE_REF"
          echo "PR_LABELS=$PR_LABELS"

          if [[ "$HEAD_REF" == "main" || "$HEAD_REF" == "master" ]]; then
            echo "ERROR: shared branches cannot be used as PR head branches."
            exit 1
          fi

          if [[ "$HEAD_REF" == fix/* ]]; then
            if [[ "$BASE_REF" == "main" || "$BASE_REF" == "master" ]]; then
              if [[ "$PR_LABELS" != *"layered-pr-exception"* ]]; then
                echo "ERROR: fix/* PRs must target a layered branch, not main/master."
                echo "Use stack/*, layer/*, release/*, or add label layered-pr-exception."
                exit 1
              fi
            fi
          fi

          echo "Branch and label policy checks passed."

      - name: Enforce linear PR commit history
        uses: actions/github-script@v7
        with:
          script: |
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              },
            );

            const mergeCommits = commits.filter(
              (commit) => Array.isArray(commit.parents) && commit.parents.length > 1,
            );

            if (mergeCommits.length > 0) {
              core.setFailed(
                `Merge commits detected in PR commit list: ${mergeCommits
                  .map((commit) => commit.sha)
                  .join(", ")}`,
              );
              return;
            }

            core.info(`PR commit list is linear across ${commits.length} commit(s).`);
