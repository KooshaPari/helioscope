apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-harness
  labels:
    app: helios-harness
spec:
  replicas: 3
  selector:
    matchLabels:
      app: helios-harness
  template:
    metadata:
      labels:
        app: helios-harness
    spec:
      containers:
      - name: helios
        image: helios-harness:latest
        ports:
        - containerPort: 8080
        - containerPort: 8081
        # Health checks
        livenessProbe:
          httpGet:
            path: /live
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        # Resource limits
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: HELIOS_VERSION
          value: "1.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: helios-harness
spec:
  ports:
  - port: 80
    targetPort: 8080
    name: http
  - port: 8081
    targetPort: 8081
    name: health
  selector:
    app: helios-harness
---
apiVersion: v1
kind: Service
metadata:
  name: helios-harness-health
spec:
  ports:
  - port: 8081
    targetPort: 8081
    name: health
  selector:
    app: helios-harness
  clusterIP: None
