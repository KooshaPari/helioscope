name: SAST Quick Check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/cwe-top-25
            .semgrep-rules/
          generateSarif: true

      - name: Check SARIF exists
        id: semgrep_check
        run: |
          if [ -f "semgrep.sarif" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: steps.semgrep_check.outputs.found == 'true'
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified --fail
        continue-on-error: true

  lint-rust:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency check
        run: |
          echo "Checking Cargo.lock for dependency compliance"
          if [ -f "Cargo.lock" ]; then
            cargo tree --depth 1 --format "{lib}" 2>/dev/null | head -30 || echo "Tree not available"
          fi
        continue-on-error: true
