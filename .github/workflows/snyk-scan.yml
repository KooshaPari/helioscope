name: Snyk Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  snyk-test:
    name: Snyk Vulnerability Test
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Check Snyk token
        id: snyk_token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is not configured; skipping Snyk test job." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "SNYK_TOKEN is configured." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Checkout code
        if: steps.snyk_token.outputs.enabled == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up Rust
        if: steps.snyk_token.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Snyk CLI
        if: steps.snyk_token.outputs.enabled == 'true'
        run: npm install -g snyk

      - name: Authenticate with Snyk
        if: steps.snyk_token.outputs.enabled == 'true'
        run: snyk auth "$SNYK_TOKEN"

      - name: Run Snyk test
        if: steps.snyk_token.outputs.enabled == 'true'
        id: snyk_test
        continue-on-error: true
        run: |
          snyk test --severity-threshold=high --json-file-output=snyk-test-report.json --all-projects --detection-depth=3

      - name: Generate SARIF report
        if: steps.snyk_token.outputs.enabled == 'true'
        continue-on-error: true
        run: |
          snyk test --sarif-file-output=snyk.sarif --severity-threshold=low --all-projects --detection-depth=3 || true

      - name: Upload SARIF to GitHub Code Scanning
        if: steps.snyk_token.outputs.enabled == 'true'
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: snyk.sarif
          category: snyk-security-scan

      - name: Add PR comment
        if: github.event_name == 'pull_request' && steps.snyk_token.outputs.enabled == 'true'
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Snyk Security Scan Results\n\nSnyk vulnerability scan completed. View results in GitHub Code Scanning dashboard.'
            });

      - name: Fail on critical vulnerabilities
        if: steps.snyk_token.outputs.enabled == 'true' && steps.snyk_test.outcome == 'failure'
        run: echo "Critical vulnerabilities detected." && exit 1

  snyk-monitor:
    name: Snyk Monitor
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Check Snyk token
        id: snyk_token
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SNYK_TOKEN is not configured; skipping Snyk monitor job." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "SNYK_TOKEN is configured." | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Checkout code
        if: steps.snyk_token.outputs.enabled == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Monitor dependencies
        if: steps.snyk_token.outputs.enabled == 'true'
        run: |
          npm install -g snyk
          snyk auth "$SNYK_TOKEN"
          snyk monitor --all-projects --detection-depth=3 || true
